name: Run calendar script

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "ics>=0.7.2" \
            "openpyxl>=3.1.5" \
            "pandas>=2.3.3" \
            "pytz>=2025.2"

      - name: Run script
        run: |
          python script.py

